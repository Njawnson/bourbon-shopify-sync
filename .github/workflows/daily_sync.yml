name: Daily Feed Sync

on:
  schedule:
    - cron: '0 10 * * *'  # 3:00 AM PDT (10:00 UTC)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync script
        env:
          FEED_URL: https://www.liquorstore-online.com/gmcfeed/shopify_feed_bls.csv
          SHOPIFY_STORE: bourbonliquorstore-com
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: python scripts/sync.py

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Daily feed update $(date +'%Y-%m-%d')"
          git push
