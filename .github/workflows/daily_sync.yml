name: Daily Feed Converter

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 1am EST (6am UTC)
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run feed converter
        env:
          FEED_URL: ${{ secrets.FEED_URL }}
        run: python scripts/sync_products.py

      - name: Commit updated CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/matrixify_update.csv
          git diff --staged --quiet || git commit -m "Daily feed update $(date +'%Y-%m-%d')"
          git push
